app = "potm-voting"
primary_region = "lhr"

[build]

[env]
  PORT = "3000"
  HOST = "0.0.0.0"
  DB_PATH = "/data/potm.db"
  UPLOAD_DIR = "/data/uploads"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "potm_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
