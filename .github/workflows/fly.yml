# Deploy to Fly.io on push/merge to main. Official action: https://github.com/superfly/flyctl-actions
# Required secret: FLY_API_TOKEN (create with: fly tokens create deploy -x 999999h)
name: Fly Deploy
on:
  push:
    branches:
      - main
jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
